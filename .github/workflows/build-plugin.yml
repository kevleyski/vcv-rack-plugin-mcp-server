name: Build VCV Rack Plugin

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

defaults:
  run:
    shell: bash

# =============================================================================
# Job 1 — Stamp plugin.json version with git short-sha on non-release builds
# =============================================================================
jobs:
  modify-plugin-version:
    name: Stamp plugin version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        id: plugin-version-cache
        with:
          path: plugin.json
          key: ${{ github.sha }}-${{ github.run_id }}

      - name: Append git sha to version (non-tag builds only)
        if: "! startsWith(github.ref, 'refs/tags/v')"
        run: |
          gitrev=$(git rev-parse --short HEAD)
          pluginversion=$(jq -r '.version' plugin.json)
          echo "Stamping version: $pluginversion → $pluginversion-$gitrev"
          jq --arg V "$pluginversion-$gitrev" '.version=$V' plugin.json > plugin.json.tmp
          mv plugin.json.tmp plugin.json

# =============================================================================
# Job 2 — Build Linux x64 (native runner, CMake)
# =============================================================================
  build-linux:
    name: Build (lin-x64)
    needs: modify-plugin-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: plugin.json
          key: ${{ github.sha }}-${{ github.run_id }}

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build jq zip

      - name: Cache Rack SDK
        uses: actions/cache@v4
        with:
          path: build/_deps/rack-sdk
          key: rack-sdk-lin-x64-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure + build
        run: make all BUILD_DIR=build

      - name: Package .vcvplugin
        run: make dist BUILD_DIR=build

      - uses: actions/upload-artifact@v4
        with:
          name: lin-x64
          path: dist/*.vcvplugin

# =============================================================================
# Job 3 — Build macOS x64 and ARM64 (native runners, CMake)
# =============================================================================
  build-mac:
    name: Build (mac-${{ matrix.arch }})
    needs: modify-plugin-version
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
        include:
          - arch: x64
            cmake_osx_arch: x86_64
          - arch: arm64
            cmake_osx_arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: plugin.json
          key: ${{ github.sha }}-${{ github.run_id }}

      - name: Install build tools
        run: brew install cmake jq zip

      - name: Cache Rack SDK (mac-${{ matrix.arch }})
        uses: actions/cache@v4
        with:
          path: build/_deps/rack-sdk
          key: rack-sdk-mac-${{ matrix.arch }}-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure + build (mac-${{ matrix.arch }})
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_osx_arch }}
          cmake --build build --parallel

      - name: Package .vcvplugin
        run: make dist BUILD_DIR=build

      - uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.arch }}
          path: dist/*.vcvplugin

