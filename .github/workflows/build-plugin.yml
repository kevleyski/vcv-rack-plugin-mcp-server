# =============================================================================
# Job 6 — Publish GitHub Release (only on version tags like v2.0.0)
# =============================================================================
  publish:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [package-release-artifacts]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify plugin.json version matches tag
        run: |
          pluginversion=$(jq -r '.version' plugin.json)
          tagversion="${GITHUB_REF_NAME#v}"
          if [ "$pluginversion" != "$tagversion" ]; then
            echo "ERROR: plugin.json version ($pluginversion) doesn't match tag ($tagversion)"
            exit 1
          fi

      - uses: actions/download-artifact@v4
        with:
          path: _artifacts
          name: release-bundles

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: vcv-rack-plugin-mcp-server ${{ github.ref_name }}
          body: |
            ## vcv-rack-plugin-mcp-server ${{ github.ref_name }}

            VCV Rack 2 plugin: exposes Rack internals to AI clients (Claude, Cursor, etc.) via HTTP/MCP.

            ### Install on macOS
            1. Download the `.vcvplugin` that matches your Mac:
               - `*-mac-arm64.vcvplugin` for Apple Silicon
               - `*-mac-x64.vcvplugin` for Intel
            2. Double-click the downloaded file to let VCV Rack install it automatically.
            3. If needed, move the file manually into your Rack 2 plugins folder and restart VCV Rack.

            ### Install on Linux
            1. Download `*-lin-x64.vcvplugin`.
            2. Move it into your Rack 2 plugins folder, or install it through the VCV Rack UI if your desktop opens `.vcvplugin` files directly.
            3. Restart VCV Rack and add the `MCP Server` module from the module browser.

            ### What's new
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
          draft: false
          prerelease: false
          files: _artifacts/**/*.vcvplugin
