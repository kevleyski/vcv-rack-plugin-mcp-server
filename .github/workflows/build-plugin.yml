# =============================================================================
# Job 5 — Publish GitHub Release (only on version tags like v2.0.0)
# =============================================================================
  publish:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build-linux, build-mac]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify plugin.json version matches tag
        run: |
          pluginversion=$(jq -r '.version' plugin.json)
          tagversion="${GITHUB_REF_NAME#v}"
          if [ "$pluginversion" != "$tagversion" ]; then
            echo "ERROR: plugin.json version ($pluginversion) doesn't match tag ($tagversion)"
            exit 1
          fi

      - uses: actions/download-artifact@v4
        with:
          path: _artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: vcv-rack-plugin-mcp-server ${{ github.ref_name }}
          body: |
            ## vcv-rack-plugin-mcp-server ${{ github.ref_name }}

            VCV Rack 2 plugin: exposes Rack internals to AI clients (Claude, Cursor, etc.) via HTTP/MCP.

            ### Installation
            Download the `.vcvplugin` for your platform and double-click, or place it in your Rack plugins folder.

            ### What's new
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
          draft: false
          prerelease: false
          files: _artifacts/**/*.vcvplugin
